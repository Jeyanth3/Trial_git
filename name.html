<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Name Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded shadow-md w-full max-w-md">
        <h1 class="text-2xl font-bold mb-4 text-center">Enter Your Name</h1>
        <form id="nameForm" class="space-y-4">
            <input type="text" id="nameInput" class="w-full px-3 py-2 border rounded" placeholder="Your name" required>
            <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600">Submit</button>
        </form>
        <p id="output" class="mt-4 text-center text-lg"></p>
    </div>

    <script>
        document.getElementById('nameForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var name = document.getElementById('nameInput').value;
            document.getElementById('output').textContent = 'Your name is ' + name;
        });
    </script>
</body>
</html>
